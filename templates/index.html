<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avito Scraper</title>
</head>
<body>
    <h1>Avito Scraper</h1>
    <form method="POST" enctype="multipart/form-data">
        <label for="queries">Enter Queries (comma-separated):</label>
        <input type="text" id="queries" name="queries" placeholder="e.g., iphone 15 pro, laptop lenovo">
        <button type="submit">Search</button>
    </form>
</body>
</html>
